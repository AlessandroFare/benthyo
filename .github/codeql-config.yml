name: Benthyo CodeQL Config

# Exclude third-party bundles and generated code from analysis.
paths-ignore:
  - '**/node_modules/**'
  - '**/generated/**'
  - '**/*.bundle.js'
  - '**/bundle.js'
  - '**/passkeys/**'
  - '**/vendor/**'
  - '**/.icon-tools/**'
  - '**/build/**'
  - '**/.dart_tool/**'
  - '**/pnpm-lock.yaml'