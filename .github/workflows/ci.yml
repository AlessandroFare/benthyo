name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile || pnpm install
        working-directory: .
      - run: pnpm build
      - run: pnpm test -- --passWithNoTests

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile || pnpm install
        working-directory: .
      - run: pnpm typecheck
      - run: pnpm build

  etl:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: etl
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm install || npm install
      - run: pnpm test || npx jest gbif/gbif.test.ts --passWithNoTests

  rls:
    # Applies every migration + seed against a real Postgres/PostGIS and
    # runs the RLS correctness suite. A red suite blocks the PR.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      # Dev placeholders so the medical-encryption migrations run; the suite
      # never asserts on real key material.
      PGOPTIONS: "-c app.medical_master_key=ci-master-key -c app.medical_key_salt=ci-salt"
    steps:
      - uses: actions/checkout@v4
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Bootstrap Supabase auth shim
        # The bare postgis image has no Supabase-managed `auth` schema, so the
        # application migrations (003 REFERENCES auth.users, 041 auth.uid())
        # cannot apply. Create a minimal compatible shim. The anon/authenticated
        # roles are also created here so the GRANTs and SET ROLE in the
        # migrations + RLS suite resolve.
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f supabase/tests/ci_auth_bootstrap.sql
      - name: Apply migrations in order
        run: |
          for f in supabase/migrations/0*.sql; do
            echo "== applying $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Seed
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f supabase/seed.sql
      - name: Run RLS test suite
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f supabase/tests/rls.sql
