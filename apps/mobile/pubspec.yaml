name: benthyo
description: Benthyo mobile dive logbook and species tracker.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  supabase_flutter: ^2.9.0
  sqflite: ^2.4.2
  path: ^1.9.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  http: ^1.3.0
  cached_network_image: ^3.4.1
  connectivity_plus: ^6.1.4
  intl: ^0.20.2
  google_fonts: ^6.2.1
  uuid: ^4.5.1
  equatable: ^2.0.7
  shared_preferences: ^2.5.3
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  sentry_flutter: ^8.14.0
  flutter_map_tile_caching: ^9.1.4
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  flutter_blue_plus: ^1.35.3
  image: ^4.5.4
  crypto: ^3.0.6
  tflite_flutter: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

# App icon generation. Run once (and after any logo change) with:
#   dart run flutter_launcher_icons
# This regenerates all iOS AppIcon.appiconset entries and Android
# mipmap-* densities from the brand assets in assets/brand/.
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/brand/icon-1024.png"
  # Adaptive icon (Android 8+): OS applies its own mask, so the foreground
  # must keep a ~18% safe-zone margin (already baked into the asset).
  adaptive_icon_background: "#0F2238"
  adaptive_icon_foreground: "assets/brand/adaptive-foreground.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/brand/
