<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- White at peak top → bright cyan on upper slopes → dark teal at base -->
    <linearGradient id="g" x1="0" y1="68" x2="0" y2="434" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="22%"  stop-color="#00E5FF"/>
      <stop offset="62%"  stop-color="#00838F"/>
      <stop offset="100%" stop-color="#1A4A5E" stop-opacity="0.4"/>
    </linearGradient>
    <clipPath id="c">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0F2238"/>

  <!--
    23 horizontal profile lines, top (background / horizon) to bottom (foreground / seafloor).
    Each line: M 40,yb C 120,yb 165,ys 195,ys  C 215,ys 234,yp 256,yp  C 285,yp 330,yr 370,yr  C 395,yr 435,yb 472,yb
      yb = baseline y
      ys = shoulder height (left secondary feature, ~38-42% of scale)
      yp = peak height    (main summit, full scale)
      yr = right feature  (right flank, ~25% of scale)
    Lines are perspective-spaced: tight at top (far), wide at bottom (near).
    Scale peaks at line 8 (the most arched line), giving summit at y≈72.
  -->
  <g clip-path="url(#c)" fill="none" stroke="url(#g)">

    <!-- ─── Horizon / background lines (nearly flat, fade in) ─── -->
    <path stroke-width="0.5" stroke-opacity="0.28" d="M 40,96 L 472,96"/>
    <path stroke-width="0.5" stroke-opacity="0.42" d="M 40,101 C 120,101 165,100 195,100 C 215,100 234,99 256,99 C 285,99 330,101 370,101 C 395,101 435,101 472,101"/>
    <path stroke-width="0.6" stroke-opacity="0.58" d="M 40,107 C 120,107 165,105 195,105 C 215,105 234,102 256,102 C 285,102 330,106 370,106 C 395,106 435,107 472,107"/>
    <path stroke-width="0.65" stroke-opacity="0.75" d="M 40,114 C 120,114 165,109 195,109 C 215,109 234,102 256,102 C 285,102 330,111 370,111 C 395,111 435,114 472,114"/>

    <!-- ─── Approaching the peak ─── -->
    <path stroke-width="0.7"  d="M 40,122 C 120,122 165,113 195,113 C 215,113 234,100 256,100 C 285,100 330,116 370,116 C 395,116 435,122 472,122"/>
    <path stroke-width="0.82" d="M 40,131 C 120,131 165,116 195,116 C 215,116 234,93 256,93 C 285,93 330,121 370,121 C 395,121 435,131 472,131"/>
    <path stroke-width="0.95" d="M 40,141 C 120,141 165,118 195,118 C 215,118 234,83 256,83 C 285,83 330,126 370,126 C 395,126 435,141 472,141"/>
    <path stroke-width="1.05" d="M 40,152 C 120,152 165,121 195,121 C 215,121 234,74 256,74 C 285,74 330,132 370,132 C 395,132 435,152 472,152"/>

    <!-- ─── Peak — most arched line, summit at y≈72 ─── -->
    <path stroke-width="1.15" d="M 40,164 C 120,164 165,127 195,127 C 215,127 234,72 256,72 C 285,72 330,141 370,141 C 395,141 435,164 472,164"/>
    <path stroke-width="1.1"  d="M 40,177 C 120,177 165,142 195,142 C 215,142 234,89 256,89 C 285,89 330,155 370,155 C 395,155 435,177 472,177"/>

    <!-- ─── Upper slopes ─── -->
    <path stroke-width="1.0"  d="M 40,191 C 120,191 165,161 195,161 C 215,161 234,115 256,115 C 285,115 330,172 370,172 C 395,172 435,191 472,191"/>
    <path stroke-width="0.95" d="M 40,206 C 120,206 165,181 195,181 C 215,181 234,144 256,144 C 285,144 330,190 370,190 C 395,190 435,206 472,206"/>
    <path stroke-width="0.9"  d="M 40,222 C 120,222 165,203 195,203 C 215,203 234,174 256,174 C 285,174 330,210 370,210 C 395,210 435,222 472,222"/>
    <path stroke-width="0.85" d="M 40,239 C 120,239 165,225 195,225 C 215,225 234,204 256,204 C 285,204 330,230 370,230 C 395,230 435,239 472,239"/>

    <!-- ─── Mid slopes ─── -->
    <path stroke-width="0.8"  d="M 40,257 C 120,257 165,247 195,247 C 215,247 234,233 256,233 C 285,233 330,251 370,251 C 395,251 435,257 472,257"/>
    <path stroke-width="0.75" d="M 40,276 C 120,276 165,270 195,270 C 215,270 234,261 256,261 C 285,261 330,272 370,272 C 395,272 435,276 472,276"/>
    <path stroke-width="0.7"  d="M 40,296 C 120,296 165,293 195,293 C 215,293 234,288 256,288 C 285,288 330,294 370,294 C 395,294 435,296 472,296"/>
    <path stroke-width="0.65" d="M 40,317 C 120,317 165,315 195,315 C 215,315 234,313 256,313 C 285,313 330,316 370,316 C 395,316 435,317 472,317"/>

    <!-- ─── Flat seafloor foreground — wide-spaced, nearly straight ─── -->
    <path stroke-width="0.6" d="M 40,339 L 472,339"/>
    <path stroke-width="0.6" d="M 40,362 L 472,362"/>
    <path stroke-width="0.6" d="M 40,386 L 472,386"/>
    <path stroke-width="0.6" d="M 40,408 L 472,408"/>
    <path stroke-width="0.6" d="M 40,426 L 472,426"/>
  </g>
</svg>
